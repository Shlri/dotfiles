#в”—в”Ғв”“ в”ғ в”Јв”Ғв”«в”Јв”ів”ӣв”—в”Ғв”“в”Јв”Ғв”«в”ғв”Јв”Ғв”ӣ
#в”—в”Ғв”ӣ в•№ в•№ в•№в•№в”—в•ёв”—в”Ғв”ӣв•№ в•№в•№в•№

format = """
$hostname\
$directory\

$localip\
$shlvl\
$singularity\
$kubernetes\
$vcsh\
$hg_branch\
$docker_context\
$package\
$custom\

$sudo\

$fill\

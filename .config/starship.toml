#в”—в”Ғв”“ в”ғ в”Јв”Ғв”«в”Јв”ів”ӣв”—в”Ғв”“в”Јв”Ғв”«в”ғв”Јв”Ғв”ӣ
#в”—в”Ғв”ӣ в•№ в•№ в•№в•№в”—в•ёв”—в”Ғв”ӣв•№ в•№в•№в•№

format = """
$hostname\
$directory\
$git_branch\
$git_status\
$git_commit\
$cmd_duration\
$jobs\
$battery\
$time\
$status\
$os\
$container\
$line_break\
$character"""


# Disable the blank line at the start of the prompt
add_newline = true

[directory]
format = "[$path]($style) [оӮ¶](fg:#6791C9 bg:none)[пҒ» ](fg:#252525 bg:#6791C9)[оӮҙ](fg:#6791C9 bg:none)  "
style = "fg:#E8E3E3 bold"
truncation_length = 3
truncate_to_repo=false
read_only = " п Ҫ"

## SECOND LINE/ROW: Prompt
# Prompt: param 2 в””в”Җ
[character]
success_symbol = "[п‘„ ](#6791C9 bold)"
error_symbol = "[п‘„ ](#B66467 bold)"

[line_break]
disabled = false

[fill]
symbol = ' '
style = 'bold green'

[cmd_duration]
min_time = 1
format = "[$duration]($style) [оӮ¶](fg:#C397D8 bg:none)[уұ‘Ӯ ](fg:#252525 bg:#C397D8)[оӮҙ](fg:#C397D8 bg:none)  "
disabled = false
style = "fg:#E8E3E3 bold"


[git_branch]
format = "[$branch]($style) [оӮ¶](fg:#81C19B bg:none)[оңҘ](fg:#252525 bg:#81C19B)[оӮҙ](fg:#81C19B bg:none) "
style = "fg:#E8E3E3"
symbol = "пҗҳ "

[git_status]
format="[$all_status$ahead_behind]($style) [оӮ¶](fg:#6791C9 bg:none)[о¬§ ](fg:#252525 bg:#6791C9)[оӮҙ](fg:#6791C9 bg:none) "
style = "fg:#E8E3E3"
conflicted = "="
ahead =	"вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
up_to_date = " у°„ё "
untracked = "?${count}"
stashed = "пЈ•"
modified = "!${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "п”Ү ${count}"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "green"

[git_state]
rebase = "REBASING"
merge =	"MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style =	"yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[aws]
